apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: monitoring
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: kube-prometheus-stack
      # Check https://github.com/prometheus-community/helm-charts/releases for the latest.
      version: "67.5.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 1h
  # Values are stored in a ConfigMap so they can be patched per cluster.
  # See values-kube-prometheus-stack.yaml for the full values definition.
  #
  # Grafana admin credentials are sourced from the 'grafana-admin-credentials' Secret.
  # The Secret must be pre-provisioned in the flux-system namespace; see the
  # comment in values-kube-prometheus-stack.yaml for creation instructions.
  valuesFrom:
    - kind: ConfigMap
      name: kube-prometheus-stack-values
      valuesKey: values.yaml
    - kind: Secret
      name: grafana-admin-credentials
      valuesKey: admin-user
      targetPath: grafana.adminUser
    - kind: Secret
      name: grafana-admin-credentials
      valuesKey: admin-password
      targetPath: grafana.adminPassword
