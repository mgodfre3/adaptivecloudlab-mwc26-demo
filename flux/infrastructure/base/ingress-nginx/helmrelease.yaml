apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: ingress-nginx
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: ingress-nginx
      # Pin to a specific patch version to ensure reproducible installs.
      # Check https://github.com/kubernetes/ingress-nginx/releases for the latest.
      version: "4.11.3"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      interval: 1h
  values:
    controller:
      replicaCount: 2
      nodeSelector:
        kubernetes.io/os: linux
      service:
        type: LoadBalancer
      admissionWebhooks:
        enabled: true
