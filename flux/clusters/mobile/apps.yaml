# Flux Kustomization: Applications (mobile cluster)
# Reconciles application-layer manifests (drone demo, IoT simulation, etc.).
# This Kustomization depends on infrastructure being healthy first.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: infrastructure
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/apps/mobile
  prune: true
  wait: true
  timeout: 5m
