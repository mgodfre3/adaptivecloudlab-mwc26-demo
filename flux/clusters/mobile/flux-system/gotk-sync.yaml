# Flux bootstrap sync — GitRepository + Kustomization
# These files are normally generated by `flux bootstrap github` (or the equivalent
# AKS Arc / Arc-enabled GitOps extension). They are provided here as a reference
# template showing what the bootstrap command produces.
#
# To bootstrap the mobile cluster, run one of:
#
#   Option A — Flux CLI:
#     flux bootstrap github \
#       --owner=mgodfre3 \
#       --repository=adaptivecloudlab-mwc26-demo \
#       --branch=main \
#       --path=flux/clusters/mobile \
#       --personal
#
#   Option B — Azure Arc GitOps extension:
#     az k8s-configuration flux create \
#       --name flux-system \
#       --cluster-name <mobile-cluster-name> \
#       --resource-group <rg> \
#       --cluster-type connectedClusters \
#       --url https://github.com/mgodfre3/adaptivecloudlab-mwc26-demo \
#       --branch main \
#       --kustomization name=flux-system path=./flux/clusters/mobile \
#       --namespace flux-system
#
# After bootstrap the Flux controller will reconcile infrastructure.yaml and
# apps.yaml defined in this directory.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m
  ref:
    branch: main
  url: https://github.com/mgodfre3/adaptivecloudlab-mwc26-demo
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m
  path: ./flux/clusters/mobile
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
