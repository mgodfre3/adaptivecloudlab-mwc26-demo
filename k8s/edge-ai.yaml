---
# ═══════════════════════════════════════════════════════════════════════════════
# Ollama – Local AI Inference Engine (GPU Node)
# Deploys Phi-4 Mini on the NVIDIA A2 GPU for edge AI inference
# Provides OpenAI-compatible API at http://ollama.edge-ai.svc:11434
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Namespace
metadata:
  name: edge-ai
  labels:
    app.kubernetes.io/part-of: drone-network-monitor
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: edge-ai
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: edge-ai
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      # Schedule on the GPU node pool
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A2
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: http
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: OLLAMA_KEEP_ALIVE
              value: "24h"
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: "5Gi"
            requests:
              memory: "4Gi"
              cpu: "1"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: edge-ai
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
      name: http
  type: ClusterIP
---
# Init job – pull Phi-4 Mini model after Ollama is ready
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-phi4
  namespace: edge-ai
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      # Also run on GPU node so it can reach Ollama quickly
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A2
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      initContainers:
        - name: wait-for-ollama
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Ollama to be ready..."
              until wget -qO- http://ollama.edge-ai.svc:11434/api/tags >/dev/null 2>&1; do
                echo "  ...not ready, retrying in 5s"
                sleep 5
              done
              echo "Ollama is ready"
      containers:
        - name: pull-model
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              echo "Pulling phi4:mini model..."
              curl -s http://ollama.edge-ai.svc:11434/api/pull \
                -d '{"name":"phi4:mini","stream":false}' \
                --max-time 600
              echo ""
              echo "Model pull complete. Verifying..."
              curl -s http://ollama.edge-ai.svc:11434/api/tags | head -c 500
              echo ""
              echo "Done."
