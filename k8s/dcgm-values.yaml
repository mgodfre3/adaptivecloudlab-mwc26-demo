# DCGM Exporter — GPU metrics for Prometheus
serviceMonitor:
  enabled: true
  additionalLabels:
    release: kube-prometheus-stack

nodeSelector:
  msft.microsoft/nodepool-name: pdx-mwc-26-cb393e45-pdxgpu

tolerations:
  - operator: Exists

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
