<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cell Tower Coverage — {{ location_name }}</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0e17; }
    #map { width: 100vw; height: 100vh; }

    .legend {
      background: rgba(10, 14, 23, 0.92);
      border: 1px solid rgba(0, 194, 255, 0.25);
      border-radius: 8px;
      padding: 10px 14px;
      color: #c8d6e5;
      font-size: 12px;
      line-height: 1.8;
      backdrop-filter: blur(6px);
    }
    .legend h4 { margin: 0 0 6px; color: #00c2ff; font-size: 13px; }
    .legend i {
      display: inline-block; width: 12px; height: 12px; border-radius: 50%;
      margin-right: 6px; vertical-align: middle;
    }

    .tower-popup { font-size: 12px; line-height: 1.6; }
    .tower-popup strong { color: #1a1a2e; }
    .tower-popup .tech { display: inline-block; padding: 1px 6px; border-radius: 3px;
      font-size: 10px; font-weight: 600; color: #fff; margin-right: 3px; }
    .tech-5g { background: #e74c3c; }
    .tech-lte { background: #3498db; }
    .tech-both { background: #9b59b6; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const CENTER = [{{ center_lat }}, {{ center_lon }}];
    const ZOOM = {{ zoom }};

    // Denver-area cell tower locations (representative data)
    const TOWERS = [
      { lat: 39.7392, lon: -104.9903, name: "Downtown Denver – 16th St", tech: "5G/LTE", provider: "T-Mobile", height: 45 },
      { lat: 39.7487, lon: -105.0003, name: "Union Station", tech: "5G", provider: "Verizon", height: 38 },
      { lat: 39.7555, lon: -104.9881, name: "RiNo / Brighton Blvd", tech: "5G/LTE", provider: "AT&T", height: 42 },
      { lat: 39.7312, lon: -104.9874, name: "Baker / S Broadway", tech: "LTE", provider: "T-Mobile", height: 35 },
      { lat: 39.7502, lon: -104.9994, name: "Coors Field Area", tech: "5G", provider: "Verizon", height: 50 },
      { lat: 39.7437, lon: -104.9870, name: "Capitol Hill", tech: "5G/LTE", provider: "AT&T", height: 40 },
      { lat: 39.7620, lon: -104.9819, name: "City Park West", tech: "LTE", provider: "T-Mobile", height: 32 },
      { lat: 39.7351, lon: -105.0093, name: "Lincoln Park", tech: "5G", provider: "Verizon", height: 44 },
      { lat: 39.7585, lon: -105.0078, name: "Highland / LoHi", tech: "5G/LTE", provider: "T-Mobile", height: 36 },
      { lat: 39.7275, lon: -104.9725, name: "Washington Park", tech: "LTE", provider: "AT&T", height: 30 },
      { lat: 39.7680, lon: -104.9730, name: "Cheesman / Botanic Gardens", tech: "5G", provider: "Verizon", height: 41 },
      { lat: 39.7460, lon: -105.0165, name: "Sun Valley", tech: "LTE", provider: "T-Mobile", height: 33 },
      { lat: 39.7536, lon: -104.9710, name: "East Colfax", tech: "5G/LTE", provider: "AT&T", height: 39 },
      { lat: 39.7700, lon: -104.9930, name: "Sunnyside", tech: "LTE", provider: "T-Mobile", height: 34 },
      { lat: 39.7215, lon: -104.9950, name: "Overland / Evans", tech: "5G", provider: "Verizon", height: 43 },
      { lat: 39.7395, lon: -104.9700, name: "Cheesman Park South", tech: "5G/LTE", provider: "AT&T", height: 37 },
      { lat: 39.7580, lon: -104.9550, name: "Montclair / Mayfair", tech: "LTE", provider: "T-Mobile", height: 31 },
      { lat: 39.7330, lon: -105.0200, name: "Barnum", tech: "LTE", provider: "AT&T", height: 29 },
      { lat: 39.7750, lon: -105.0050, name: "Berkeley", tech: "5G", provider: "Verizon", height: 46 },
      { lat: 39.7155, lon: -104.9810, name: "University / DU", tech: "5G/LTE", provider: "T-Mobile", height: 38 },
    ];

    const map = L.map("map", { zoomControl: false }).setView(CENTER, ZOOM);
    L.control.zoom({ position: "topright" }).addTo(map);

    // Dark basemap
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
      maxZoom: 19,
    }).addTo(map);

    function techColor(tech) {
      if (tech.includes("5G") && tech.includes("LTE")) return "#9b59b6";
      if (tech.includes("5G")) return "#e74c3c";
      return "#3498db";
    }

    function techClass(tech) {
      if (tech.includes("5G") && tech.includes("LTE")) return "tech-both";
      if (tech.includes("5G")) return "tech-5g";
      return "tech-lte";
    }

    // Draw coverage circles and tower markers
    TOWERS.forEach((t) => {
      const color = techColor(t.tech);
      const radius = t.tech.includes("5G") ? 600 : 900;

      // Coverage area
      L.circle([t.lat, t.lon], {
        radius: radius,
        color: color,
        fillColor: color,
        fillOpacity: 0.10,
        weight: 1,
        opacity: 0.35,
        dashArray: "4 4",
      }).addTo(map);

      // Tower marker
      const marker = L.circleMarker([t.lat, t.lon], {
        radius: 6,
        fillColor: color,
        color: "#fff",
        weight: 1.5,
        fillOpacity: 0.9,
      }).addTo(map);

      marker.bindPopup(`
        <div class="tower-popup">
          <strong>${t.name}</strong><br/>
          <span class="tech ${techClass(t.tech)}">${t.tech}</span>
          ${t.provider}<br/>
          Height: ${t.height}m &middot; Range: ${radius}m
        </div>
      `);
    });

    // Legend
    const legend = L.control({ position: "bottomleft" });
    legend.onAdd = function () {
      const div = L.DomUtil.create("div", "legend");
      div.innerHTML = `
        <h4>📡 Cell Towers — {{ location_name }}</h4>
        <i style="background:#e74c3c"></i> 5G NR<br/>
        <i style="background:#3498db"></i> LTE<br/>
        <i style="background:#9b59b6"></i> 5G + LTE<br/>
        <small style="color:#666">${TOWERS.length} towers &middot; Representative data</small>
      `;
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
